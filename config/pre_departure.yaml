# ============================================================
# PSAR Team Lead Pre-Departure Checklist
# ============================================================
# Edit this file to change checklist content without modifying
# app code. The app reads this YAML at startup.
#
# Supported item types:
#   checkbox   — standard check-off item
#   text       — short text input field
#   team_list  — team member list with role assignment
#
# Optional item fields:
#   important  — true to visually emphasize the item
#   helper     — tooltip / helper text shown below the item
#   report     — true to include field value in the report
#   placeholder — placeholder text for text inputs
# ============================================================

id: pre_departure
title: Team Lead Pre-Departure Checklist
subtitle: Complete before leaving Command Post
version: 1

sections:
  briefing_team:
    title: BRIEFING & TEAM
    items:
      team_members:
        type: team_list
        label: Team Members
        roles: [Medical, Navigator, Comms, Driver]
        report: true
      confirm_briefing:
        type: checkbox
        label: Confirm team received all briefing info
        helper: Confirm team's note completeness and pass along any additional information.
      record_names:
        type: checkbox
        label: Confirm all members have signed in
        important: true
      experience_check:
        type: checkbox
        label: Confirm team experience level
      Role_assignment:
        type: checkbox
        label: Assign Navigator / Comms / Lead Medical / Driver
        helper: Use team member list above.

  task_navigation:
    title: TASK, NAVIGATION, & TRANSPORT
    items:
      confirm_segment:
        type: checkbox
        label: Communicate assigned segment / task
      confirm_search_type:
        type: checkbox
        label: Confirm search type (hasty, line, etc.)
      confirm_route:
        type: checkbox
        label: Confirm segment start point / drop off point
      confirm_transport:
        type: checkbox
        label: Confirm transport arrangements to segment
      confirm_nav_tools:
        type: checkbox
        label: Confirm nav tools / CalTopo loaded for all
      confirm_tracks:
        type: checkbox
        label: Confirm who is recording tracks (all / designated)

  communications:
    title: COMMUNICATIONS
    items:
      radio_channel:
        type: text
        label: Radio Channel
        placeholder: e.g. Channel 3
        report: true
      checkin_interval:
        type: text
        label: Check-in Interval
        placeholder: e.g. 30 min
        report: true
      radio_check:
        type: checkbox
        label: Complete radio check
      comms_requests:
        type: checkbox
        label: Note any specific comms requests from Command
      advise_command:
        type: checkbox
        label: Advise Command when proceeding to segment

  medical:
    title: MEDICAL
    items:
      highest_medical:
        type: checkbox
        label: Identify highest medical certification on team
        helper: Likely candidate for lead medical
      med_kit:
        type: checkbox
        label: Confirm personal med kits and locations carried
      required_meds:
        type: checkbox
        label: Confirm team medical conditions and medication carried
        helper: Sensitive item, ensure a safe space for disclosure. Confirm where meds are carried.

  ppe_readiness:
    title: PPE & READINESS
    items:
      fit_for_duty:
        type: checkbox
        label: Confirm fit for duty / personal readiness
      individual_ppe:
        type: checkbox
        label: Confirm individual PPE
        helper: iPro, gloves, long sleeves, bear spray coverage, and other task-appropriate PPE.
        important: true

  hazard_assessment:
    title: HAZARD ASSESSMENT
    items:
      key_hazards:
        type: checkbox
        label: Re-state key hazards from main briefing
        important: true
      radems:
        type: checkbox
        label: Complete RADeMS and send to command
      time_constraints:
        type: checkbox
        label: Confirm any time constraints / darkness / hard stops

  documentation:
    title: DOCUMENTATION & PROTOCOLS
    items:
      document_findings:
        type: checkbox
        label: Remind team on note taking protocol
      review_protocol:
        type: checkbox
        label: Review protocol for clue found / subject found

  final_check:
    title: FINAL CHECK
    items:
      questions:
        type: checkbox
        label: Ask team: questions, concerns, anything missed?
      remind_approach:
        type: checkbox
        label: Remind team they can approach privately any time with concerns
